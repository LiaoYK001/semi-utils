<script>
    function treeNode(node, isInput, depth = 0) {
        return {
            node: node,
            isInput: isInput,
            depth: depth,
            isOpen: depth === 0,
            loadingChildren: false,
            childrenLoaded: !!(node.children && node.children.length > 0),

            get isFile() {
                return !!this.node.is_file;
            },

            get hasChildren() {
                // has_children 是后端标记（目录下是否有子项），children 是已加载的数据
                return !!(this.node.has_children) || (this.node.children && this.node.children.length > 0);
            },

            get value() {
                return this.node.value || this.node.key;
            },

            get label() {
                return this.node.label || this.node.title || this.node.name;
            },

            get rating() {
                return this.isFile ? (this.node.rating || null) : null;
            },

            get ratingLabel() {
                if (!this.rating) return '未评级';
                const stars = '★★★★★'.slice(0, this.rating);
                const empty = '☆☆☆☆☆'.slice(0, 5 - this.rating);
                return stars + empty;
            },

            get isChecked() {
                if (this.isFile) {
                    return window.Alpine.store('app').selectedItems.includes(this.value);
                }
                return this.areAllChildrenSelected(this.node);
            },

            areAllChildrenSelected(node) {
                if (!node.children || node.children.length === 0) return false;
                return node.children.every(child => {
                    if (child.is_file) {
                        return window.Alpine.store('app').selectedItems.includes(child.value || child.key);
                    }
                    return this.areAllChildrenSelected(child);
                });
            },

            getAllFileValues(node) {
                let paths = [];
                if (node.is_file) {
                    paths.push(node.value || node.key);
                } else if (node.children) {
                    node.children.forEach(child => {
                        paths = paths.concat(this.getAllFileValues(child));
                    });
                }
                return paths;
            },

            toggle(event) {
                const app = window.Alpine.store('app');
                if (this.isInput && this.isFile) {
                    app.toggleFileSelection(this.node, event || {});
                    return;
                }
                const targetValues = this.getAllFileValues(this.node);

                if (this.isChecked) {
                    app.selectedItems = app.selectedItems.filter(v => !targetValues.includes(v));
                } else {
                    app.selectedItems = [...new Set([...app.selectedItems, ...targetValues])];
                }
            },

            handleClick(event) {
                if (this.isFile) {
                    const app = window.Alpine.store('app');
                    app.handleFileActivate(this.node, event || {});
                } else if (this.hasChildren) {
                    this.toggleFolder();
                }
            },

            openContextMenu(event) {
                if (!this.isInput || !this.isFile) return;
                const app = window.Alpine.store('app');
                app.openContextMenu(this.node, event);
            },

            async toggleFolder() {
                if (!this.hasChildren) return;

                if (this.isOpen) {
                    // 折叠
                    this.isOpen = false;
                } else {
                    // 展开：首次展开时懒加载子节点
                    if (!this.childrenLoaded) {
                        await this.loadChildren();
                    }
                    this.isOpen = true;
                }
            },

            async loadChildren() {
                const path = this.value;
                if (!path) return;

                this.loadingChildren = true;
                const app = window.Alpine.store('app');
                if (app.addDebugLog) {
                    app.addDebugLog('request', `GET /api/v1/file/children?path=${encodeURIComponent(path)}`);
                }

                try {
                    const res = await fetch(`/api/v1/file/children?path=${encodeURIComponent(path)}`);
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    const json = await res.json();
                    const children = json.children || [];

                    // 更新节点数据
                    this.node.children = children;
                    this.childrenLoaded = true;

                    if (app.addDebugLog) {
                        app.addDebugLog('info', `加载子节点: ${path} -> ${children.length} 项`);
                    }
                } catch (e) {
                    console.error('loadChildren failed:', e);
                    if (app.addDebugLog) {
                        app.addDebugLog('error', `加载子节点失败: ${path} -> ${e.message}`);
                    }
                    // 即使失败也标记为已加载，避免重复请求
                    this.node.children = [];
                    this.childrenLoaded = true;
                } finally {
                    this.loadingChildren = false;
                }
            },

            get folderIcon() {
                return `<svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                </svg>`;
            },

            get fileIcon() {
                return `<svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>`;
            }
        }
    }

    function app() {
        return {
            isStatic: true,
            loading: {files: false, process: false, preview: false},
            config: {input_folder: '', output_folder: '', template: '{}', template_name: '', quality: 100, override_existed: false, preserve_exif: true, scan_subdirectories: false},
            availableTemplates: [],
            availableFonts: [],
            rawInputTreeData: [],
            inputTreeData: [],
            outputTreeData: [],
            treeKey: 0,
            selectedItems: [],
            ratingFilter: 'all',
            ratingSort: 'default',
            ratingGroupMode: false,
            visibleInputFileCount: 0,
            visibleInputFiles: [],
            visibleThumbGroups: [],
            lastSelectedPath: '',
            contextMenu: {show: false, x: 0, y: 0, file: null},
            marquee: {
                active: false,
                startX: 0,
                startY: 0,
                x: 0,
                y: 0,
                baseSelected: [],
                additive: false
            },
            layoutPrefs: {
                leftPane: 25,
                centerPane: 50,
                inputPane: 65,
                logHeight: 192,
                fileViewMode: 'list'
            },
            customTexts: {},
            watermarkFonts: {},
            cacheStats: {size_mb: 0, total_entries: 0, custom_texts: 0, max_size_mb: 200},
            showCacheInfo: false,
            preview: {url: '', name: '', path: '', isFile: false},
            aceEditor: null,
            // 底部居中信息水印 — 逐行设置
            showBottomCenterSettings: true,
            bottomCenterActiveTab: 'location',
            globalWatermarkFont: '',
            bottomCenterSettings: {
                location: { opacity: 230, font: 'AlibabaPuHuiTi-2-45-Light.otf', height: 4.8, bottom: 19.2 },
                time:     { opacity: 115, font: 'AlibabaPuHuiTi-2-45-Light.otf', height: 1.68, bottom: 13.6 },
                parameter:{ opacity: 165, font: 'AlibabaPuHuiTi-2-45-Light.otf', height: 2.4, bottom: 8.8 },
            },
            // 地点预设标签
            presets: [],
            showPresetManager: false,
            newPresetText: '',
            debug: {
                collapsed: false,
                logs: [],
                nextId: 1,
                maxEntries: 300,
                lastError: ''
            },
            progress: {
                active: false,
                complete: false,
                total: 0,
                processed: 0,
                success: 0,
                failure: 0,
                skipped: 0,
                percent: 0,
                current: '',
                message: '',
                completeMessage: ''
            },
            modal: {
                show: false,
                mode: 'create', // 'create' or 'saveas'
                inputValue: '',
                error: '',
                callback: null,

                open(mode, callback) {
                    this.mode = mode;
                    this.callback = callback;
                    this.inputValue = '';
                    this.error = '';
                    this.show = true;
                    // 自动聚焦输入框
                    queueMicrotask(() => {
                        const input = document.querySelector('input[x-model="modal.inputValue"]');
                        if (input) input.focus();
                    });
                },

                confirm() {
                    const name = this.inputValue.trim();
                    if (!name) {
                        this.error = '请输入模板名称';
                        return;
                    }

                    // 检查是否已存在（通过 store 获取 availableTemplates）
                    const app = Alpine.store('app');
                    if (app.availableTemplates.includes(name)) {
                        this.error = `模板 "${name}" 已存在`;
                        return;
                    }

                    this.show = false;
                    if (this.callback) {
                        this.callback(name);
                    }
                }
            },

            get isValidConfig() {
                return this.isStatic;
            },

            get canStart() {
                return this.isStatic && this.selectedItems.length > 0 && !this.progress.active;
            },

            get marqueeStyle() {
                const left = Math.min(this.marquee.startX, this.marquee.x);
                const top = Math.min(this.marquee.startY, this.marquee.y);
                const width = Math.abs(this.marquee.x - this.marquee.startX);
                const height = Math.abs(this.marquee.y - this.marquee.startY);
                return `left:${left}px;top:${top}px;width:${width}px;height:${height}px`;
            },

            get contextMenuStyle() {
                return `left:${this.contextMenu.x}px;top:${this.contextMenu.y}px`;
            },

            get isBottomCenterMode() {
                return this.config.template_name === '底部居中信息水印';
            },

            get currentCustomText() {
                return this.preview.path ? (this.customTexts[this.preview.path] || '') : '';
            },

            get currentWatermarkFont() {
                return this.preview.path ? (this.watermarkFonts[this.preview.path] || '') : '';
            },

            // ---- 底部居中水印逐行设置 ----

            /** 从 Jinja2 vh() 表达式中提取百分比数值 */
            extractVhPercent(value) {
                if (typeof value === 'number') return value;
                const s = String(value || '');
                const m = s.match(/vh\(\s*([\d.]+)\s*\)/);
                return m ? parseFloat(m[1]) : (parseFloat(s) || 0);
            },

            /** 从 Jinja2 default() 过滤器中提取字体名，或直接返回字符串 */
            extractFontName(value) {
                if (!value) return '';
                const s = String(value);
                const m = s.match(/default\s*\(\s*'([^']+)'\s*\)/);
                return m ? m[1] : s;
            },

            /** 从 ACE 编辑器 JSON 中解析逐行设置到 bottomCenterSettings */
            parseBottomCenterSettings() {
                try {
                    const tpl = JSON.parse(this.aceEditor.getValue());
                    if (!Array.isArray(tpl) || !tpl.length) return;
                    const node = tpl[0];
                    if (node.processor_name !== 'bottom_center_info_watermark') return;

                    const loc = this.bottomCenterSettings.location;
                    loc.opacity = parseInt(node.location_opacity) || 230;
                    loc.font    = this.extractFontName(node.location_font_path || node.font_path);
                    loc.height  = this.extractVhPercent(node.location_height);
                    loc.bottom  = this.extractVhPercent(node.location_bottom || node.bottom_offset);

                    const tim = this.bottomCenterSettings.time;
                    tim.opacity = parseInt(node.time_opacity) || 115;
                    tim.font    = this.extractFontName(node.font_path);
                    tim.height  = this.extractVhPercent(node.time_height);
                    tim.bottom  = this.extractVhPercent(node.time_bottom || node.bottom_offset);

                    const par = this.bottomCenterSettings.parameter;
                    par.opacity = parseInt(node.parameter_opacity) || 165;
                    par.font    = this.extractFontName(node.parameter_font_path || node.font_path);
                    par.height  = this.extractVhPercent(node.parameter_height);
                    par.bottom  = this.extractVhPercent(node.parameter_bottom || node.bottom_offset);
                    if (!this.globalWatermarkFont) {
                        this.globalWatermarkFont = loc.font || tim.font || par.font || '';
                    }
                } catch (_) { /* 忽略解析错误 */ }
            },

            /** 将逐行设置写回 ACE 编辑器 JSON */
            applyBottomCenterSetting(line, field, value) {
                try {
                    const tpl = JSON.parse(this.aceEditor.getValue());
                    if (!Array.isArray(tpl) || !tpl.length) return;
                    const node = tpl[0];
                    if (node.processor_name !== 'bottom_center_info_watermark') return;

                    const keyMap = {
                        location:  { opacity: 'location_opacity',  font: 'location_font_path', height: 'location_height',  bottom: 'location_bottom' },
                        time:      { opacity: 'time_opacity',      font: 'font_path',           height: 'time_height',      bottom: 'time_bottom' },
                        parameter: { opacity: 'parameter_opacity', font: 'parameter_font_path', height: 'parameter_height', bottom: 'parameter_bottom' },
                    };
                    const jsonKey = keyMap[line]?.[field];
                    if (!jsonKey) return;

                    if (field === 'opacity') {
                        node[jsonKey] = parseInt(value) || 0;
                    } else if (field === 'font') {
                        node[jsonKey] = value || node.font_path || "AlibabaPuHuiTi-2-45-Light.otf";
                    } else if (field === 'height' || field === 'bottom') {
                        node[jsonKey] = String.fromCharCode(123,123) + 'vh(' + (parseFloat(value) || 0) + ')' + String.fromCharCode(125,125);
                    }

                    this.aceEditor.setValue(JSON.stringify(tpl, null, 2), -1);
                    this.config.template = this.aceEditor.getValue();
                } catch (_) { /* 忽略 */ }
            },

            /** UI 控件变更入口 */
            updateBottomCenterSetting(line, field, value) {
                this.bottomCenterSettings[line][field] = (field === 'font') ? value : parseFloat(value) || 0;
                this.applyBottomCenterSetting(line, field, value);
                // 字体变更时同步全局字体
                if (field === 'font') {
                    this.setGlobalWatermarkFont(value || '');
                }
            },

            setGlobalWatermarkFont(value) {
                this.globalWatermarkFont = value || '';
                if (this.isBottomCenterMode) {
                    ['location', 'time', 'parameter'].forEach(line => {
                        this.bottomCenterSettings[line].font = this.globalWatermarkFont;
                        this.applyBottomCenterSetting(line, 'font', this.globalWatermarkFont);
                    });
                }
                this.config.watermark_font = this.globalWatermarkFont;
                this.resetPreviewImage();
                this.addDebugLog('info', `设置全局字体: ${this.globalWatermarkFont || '模板默认字体'}`);
            },

            // ---- 地点预设标签管理 ----

            async fetchPresets() {
                try {
                    const res = await fetch('/api/v1/presets');
                    const json = await res.json();
                    this.presets = json.presets || [];
                } catch (_) {}
            },

            async savePresetsToServer() {
                try {
                    await fetch('/api/v1/presets', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({presets: this.presets})
                    });
                } catch (e) {
                    this.toast('保存预设失败: ' + e.message, 'error');
                }
            },

            addPreset() {
                const text = this.newPresetText.trim();
                if (!text) return;
                if (this.presets.includes(text)) {
                    this.toast('该预设已存在', 'error');
                    return;
                }
                this.presets.push(text);
                this.newPresetText = '';
                this.savePresetsToServer();
                this.toast(`已添加预设: ${text}`, 'success');
            },

            addCurrentTextAsPreset() {
                const text = this.currentCustomText.trim();
                if (!text) return;
                if (this.presets.includes(text)) {
                    this.toast('该预设已存在', 'error');
                    return;
                }
                this.presets.push(text);
                this.savePresetsToServer();
                this.toast(`已保存为预设: ${text}`, 'success');
            },

            removePreset(index) {
                const name = this.presets[index];
                this.presets.splice(index, 1);
                this.savePresetsToServer();
                this.toast(`已删除预设: ${name}`, 'success');
            },

            async applyPresetToSelected(presetText) {
                if (!presetText) return;
                let count = 0;
                const batch = {};
                this.selectedItems.forEach(path => {
                    this.customTexts[path] = presetText;
                    batch[path] = presetText;
                    count++;
                });
                await this.saveCustomTextsToCache(batch);
                this.resetPreviewImage();
                this.applyInputTreeView();
                this.toast(`已将 "${presetText}" 应用到 ${count} 个文件`, 'success');
            },

            async applyPresetToCurrent(presetText) {
                if (!this.preview.path || !presetText) return;
                this.customTexts[this.preview.path] = presetText;
                await this.saveCustomTextToCache(this.preview.path, presetText);
                this.resetPreviewImage();
                this.applyInputTreeView();
                this.toast(`已应用: ${presetText}`, 'success');
            },

            async init() {
                Alpine.store('app', this);
                this.installDebugHooks();
                this.loadLayoutPrefs();
                this.addDebugLog('info', '应用初始化');
                this.initEditor();

                this.toast = (msg, type = 'info') => {
                    Toastify({
                        text: msg,
                        duration: 3000,
                        gravity: "top",
                        position: "center",
                        style: {
                            background: type === 'error' ? "#ef4444" : (type === 'success' ? "#10b981" : "#3b82f6"),
                            borderRadius: "12px",
                            fontSize: "14px",
                            fontWeight: "500",
                            boxShadow: "0 10px 15px -3px rgba(0, 0, 0, 0.1)",
                            padding: "12px 24px"
                        }
                    }).showToast();
                };

                await this.fetchConfig();
                await this.fetchFiles();
                await this.loadCustomTextsFromCache();
                await this.fetchCacheStats();
            },

            loadLayoutPrefs() {
                try {
                    const saved = JSON.parse(localStorage.getItem('semiUtilsLayoutPrefs') || '{}');
                    const leftPane = this.clampNumber(saved.leftPane, 18, 35, this.layoutPrefs.leftPane);
                    this.layoutPrefs = {
                        ...this.layoutPrefs,
                        ...saved,
                        leftPane: leftPane,
                        centerPane: this.clampNumber(saved.centerPane, 32, 78 - leftPane, this.layoutPrefs.centerPane),
                        inputPane: this.clampNumber(saved.inputPane, 25, 80, this.layoutPrefs.inputPane),
                        logHeight: this.clampNumber(saved.logHeight, 80, 420, this.layoutPrefs.logHeight),
                        fileViewMode: saved.fileViewMode === 'thumb' ? 'thumb' : 'list',
                    };
                } catch (_) {}
                this.applyLayoutPrefsToCss();
            },

            saveLayoutPrefs() {
                localStorage.setItem('semiUtilsLayoutPrefs', JSON.stringify(this.layoutPrefs));
            },

            clampNumber(value, min, max, fallback) {
                const n = Number(value);
                if (!Number.isFinite(n)) return fallback;
                return Math.max(min, Math.min(max, n));
            },

            applyLayoutPrefsToCss() {
                const root = document.documentElement;
                root.style.setProperty('--left-pane', `${this.layoutPrefs.leftPane}%`);
                root.style.setProperty('--center-pane', `${this.layoutPrefs.centerPane}%`);
                root.style.setProperty('--input-pane', `${this.layoutPrefs.inputPane}%`);
            },

            resetLayoutPrefs() {
                this.layoutPrefs = {
                    leftPane: 25,
                    centerPane: 50,
                    inputPane: 65,
                    logHeight: 192,
                    fileViewMode: 'list'
                };
                this.applyLayoutPrefsToCss();
                this.saveLayoutPrefs();
                this.applyInputTreeView();
                this.addDebugLog('info', '布局已重置');
            },

            setFileViewMode(mode) {
                this.layoutPrefs.fileViewMode = mode === 'thumb' ? 'thumb' : 'list';
                this.saveLayoutPrefs();
                this.addDebugLog('info', `文件视图: ${this.layoutPrefs.fileViewMode}`);
            },

            startPaneResize(event, type) {
                if (window.innerWidth < 1024) return;
                event.preventDefault();
                const startX = event.clientX;
                const startY = event.clientY;
                const startPrefs = {...this.layoutPrefs};
                const viewportWidth = Math.max(window.innerWidth, 1);
                const viewportHeight = Math.max(window.innerHeight, 1);

                const onMove = (moveEvent) => {
                    if (type === 'left') {
                        const delta = ((moveEvent.clientX - startX) / viewportWidth) * 100;
                        this.layoutPrefs.leftPane = this.clampNumber(startPrefs.leftPane + delta, 18, 35, startPrefs.leftPane);
                        this.layoutPrefs.centerPane = this.clampNumber(this.layoutPrefs.centerPane, 32, 78 - this.layoutPrefs.leftPane, this.layoutPrefs.centerPane);
                    } else if (type === 'center') {
                        const delta = ((moveEvent.clientX - startX) / viewportWidth) * 100;
                        this.layoutPrefs.centerPane = this.clampNumber(startPrefs.centerPane + delta, 32, 78 - this.layoutPrefs.leftPane, startPrefs.centerPane);
                    } else if (type === 'fileSplit') {
                        const delta = ((moveEvent.clientY - startY) / viewportHeight) * 100;
                        this.layoutPrefs.inputPane = this.clampNumber(startPrefs.inputPane + delta, 25, 80, startPrefs.inputPane);
                    } else if (type === 'log') {
                        const delta = startY - moveEvent.clientY;
                        this.layoutPrefs.logHeight = this.clampNumber(startPrefs.logHeight + delta, 80, 420, startPrefs.logHeight);
                    }
                    this.applyLayoutPrefsToCss();
                };

                const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    this.saveLayoutPrefs();
                };

                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp, {once: true});
            },

            installDebugHooks() {
                if (window.__semiUtilsDebugHooksInstalled) return;
                window.__semiUtilsDebugHooksInstalled = true;

                ['log', 'warn', 'error'].forEach((level) => {
                    const original = console[level].bind(console);
                    console[level] = (...args) => {
                        original(...args);
                        const app = Alpine.store('app');
                        if (app && app.addDebugLog) {
                            app.addDebugLog(level, args.map(arg => app.formatDebugArg(arg)).join(' '));
                        }
                    };
                });

                window.addEventListener('error', (event) => {
                    const app = Alpine.store('app');
                    if (app && app.addDebugLog) {
                        app.addDebugLog('error', `${event.message} @ ${event.filename}:${event.lineno}:${event.colno}`);
                    }
                });

                window.addEventListener('unhandledrejection', (event) => {
                    const app = Alpine.store('app');
                    if (app && app.addDebugLog) {
                        app.addDebugLog('error', `Unhandled promise rejection: ${app.formatDebugArg(event.reason)}`);
                    }
                });
            },

            formatDebugArg(arg) {
                if (arg instanceof Error) {
                    return `${arg.name}: ${arg.message}`;
                }
                if (typeof arg === 'string') {
                    return arg;
                }
                try {
                    return JSON.stringify(arg);
                } catch (e) {
                    return String(arg);
                }
            },

            addDebugLog(level, message) {
                const now = new Date();
                const entry = {
                    id: this.debug.nextId++,
                    time: now.toLocaleTimeString('zh-CN', {hour12: false}),
                    level: String(level || 'info').toUpperCase(),
                    message: String(message || '')
                };
                this.debug.logs.push(entry);
                if (this.debug.logs.length > this.debug.maxEntries) {
                    this.debug.logs.splice(0, this.debug.logs.length - this.debug.maxEntries);
                }
                if (entry.level === 'ERROR') {
                    this.debug.lastError = entry.message.slice(0, 80);
                }
                queueMicrotask(() => {
                    const logList = this.$refs.debugLogList;
                    if (logList) logList.scrollTop = logList.scrollHeight;
                });
            },

            debugLevelClass(level) {
                return {
                    'ERROR': 'text-danger-300',
                    'WARN': 'text-amber-300',
                    'LOG': 'text-slate-300',
                    'INFO': 'text-primary-300',
                    'SUCCESS': 'text-emerald-300',
                    'REQUEST': 'text-cyan-300',
                    'SSE': 'text-violet-300'
                }[level] || 'text-slate-300';
            },

            clearDebugLogs() {
                this.debug.logs = [];
                this.debug.lastError = '';
                this.addDebugLog('info', '日志已清空');
            },

            async copyDebugLogs() {
                const text = this.debug.logs
                    .map(entry => `[${entry.time}] ${entry.level} ${entry.message}`)
                    .join('\n');
                try {
                    await navigator.clipboard.writeText(text);
                    this.addDebugLog('success', '日志已复制到剪贴板');
                } catch (e) {
                    this.addDebugLog('error', '复制日志失败: ' + e.message);
                }
            },

            initEditor() {
                this.aceEditor = ace.edit("json-editor");
                this.aceEditor.setTheme("ace/theme/textmate");
                this.aceEditor.session.setMode("ace/mode/json");
                this.aceEditor.setShowPrintMargin(false);
                this.aceEditor.setReadOnly(true);

                this.aceEditor.on('change', () => {
                    this.config.template = this.aceEditor.getValue();
                });
            },

            enableEdit() {
                this.isStatic = false;
                this.aceEditor.setReadOnly(false);
                this.aceEditor.container.style.backgroundColor = "#fff";
            },

            async resetConfig() {
                await this.fetchConfig();
            },

            async fetchConfig() {
                this.addDebugLog('request', 'GET /api/v1/config');
                try {
                    const res = await fetch('/api/v1/config');
                    this.addDebugLog('request', `GET /api/v1/config -> ${res.status} ${res.statusText}`);
                    const json = await res.json();
                    const data = this.normalizeApiResponse(json);

                    if (data) {
                        this.config = {...data};
                        let tplStr = typeof this.config.template === 'object' ?
                            JSON.stringify(this.config.template, null, 2) :
                            this.config.template;

                        this.aceEditor.setValue(tplStr || '{}', -1);
                        this.isStatic = true;
                        this.aceEditor.setReadOnly(true);
                        this.aceEditor.container.style.backgroundColor = "#f9fafb";

                        // 获取模板列表
                        if (data.templates) {
                            this.availableTemplates = data.templates;
                        }
                        if (data.fonts) {
                            this.availableFonts = data.fonts;
                        }
                        this.globalWatermarkFont = data.watermark_font || '';
                        this.addDebugLog('info', `配置加载完成: template=${this.config.template_name}, templates=${this.availableTemplates.length}, fonts=${this.availableFonts.length}`);
                        this.parseBottomCenterSettings();
                        if (data.presets) { this.presets = data.presets; }
                    }
                } catch (e) {
                    this.addDebugLog('error', '获取配置失败: ' + e.message);
                    this.toast("获取配置失败: " + e.message, 'error');
                }
            },

            async switchTemplate(templateName) {
                this.addDebugLog('request', `GET /api/v1/template/${templateName}`);
                try {
                    const res = await fetch(`/api/v1/template/${templateName}`);
                    this.addDebugLog('request', `GET /api/v1/template/${templateName} -> ${res.status} ${res.statusText}`);
                    if (!res.ok) {
                        throw new Error(`加载模板失败: ${res.statusText}`);
                    }
                    const json = await res.json();
                    const tplStr = typeof json.content === 'object' ?
                        JSON.stringify(json.content, null, 2) :
                        json.content;

                    this.aceEditor.setValue(tplStr || '{}', -1);
                    this.config.template = tplStr;
                    this.config.template_name = templateName;
                    this.resetPreviewImage();
                    this.addDebugLog('info', `切换模板: ${templateName}`);
                    this.parseBottomCenterSettings();
                    this.toast(`已切换到模板: ${templateName}`, 'success');
                } catch (e) {
                    this.addDebugLog('error', '切换模板失败: ' + e.message);
                    this.toast("切换模板失败: " + e.message, 'error');

                    JSON.parse(jsonVal);

                    const res = await fetch('/api/v1/config', {

                    if (res.ok) {

                    this.toast("保存失败: " + e.message, 'error');

            async fetchFiles(renderInput=true) {
                this.loading.files = true;
                this.addDebugLog('request', `GET /api/v1/file/tree renderInput=${renderInput}`);
                console.log('[fetchFiles] 开始请求, renderInput=', renderInput);

                try {
                    const res = await fetch('/api/v1/file/tree', {
                        method: 'GET',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        },
                        cache: 'no-store'
                    });

                    console.log('[fetchFiles] 响应状态:', res.status, res.statusText);
                    this.addDebugLog('request', `GET /api/v1/file/tree -> ${res.status} ${res.statusText}`);

                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                    }

                    const json = await res.json();
                    const data = this.normalizeApiResponse(json);
                    console.log('[fetchFiles] 解析完成, input_files:', data.input_files?.length, 'output_files:', data.output_files?.length);
                    this.addDebugLog('info', `文件树解析完成: input=${data.input_files?.length || 0}, output=${data.output_files?.length || 0}`);

                    const allCurrentFileValues = new Set();
                    const collectValues = (node) => {
                        if (node.is_file) {
                            allCurrentFileValues.add(node.value || node.key);
                        }
                        if (node.children) {
                            node.children.forEach(collectValues);
                        }
                    };

                    if (data.input_files) {
                        data.input_files.forEach(collectValues);
                        this.selectedItems = this.selectedItems.filter(v => allCurrentFileValues.has(v));

                        // 增加 treeKey 强制重新渲染树节点
                        this.treeKey = (this.treeKey || 0) + 1;

                        if (renderInput) {
                            this.rawInputTreeData = JSON.parse(JSON.stringify(data.input_files || []));
                            this.applyInputTreeView();
                        }
                        this.outputTreeData = JSON.parse(JSON.stringify(data.output_files || []));
                    }
                } catch (e) {
                    console.error('[fetchFiles] 请求失败:', e);
                    this.addDebugLog('error', '文件列表加载失败: ' + e.message);
                    this.toast("文件列表加载失败: " + e.message, 'error');
                } finally {
                    console.log('[fetchFiles] 完成, loading.files = false');
                    this.addDebugLog('info', '文件列表加载结束');
                    this.loading.files = false;
                }
            },

            normalizeRatingValue(value) {
                const rating = Number(value);
                return Number.isInteger(rating) && rating >= 1 && rating <= 5 ? rating : null;
            },

            matchesRatingFilter(node) {
                const rating = this.normalizeRatingValue(node.rating);
                if (this.ratingFilter === 'all') return true;
                if (this.ratingFilter === 'unrated') return rating === null;
                if (this.ratingFilter.startsWith('gte')) {
                    const threshold = Number(this.ratingFilter.replace('gte', ''));
                    return rating !== null && rating >= threshold;
                }
                return rating === Number(this.ratingFilter);
            },

            collectInputFiles(nodes) {
                let files = [];
                (nodes || []).forEach(node => {
                    if (node.is_file) {
                        files.push({...node, rating: this.normalizeRatingValue(node.rating)});
                    } else if (node.children) {
                        files = files.concat(this.collectInputFiles(node.children));
                    }
                });
                return files;
            },

            compareFileNodes(a, b) {
                if (this.ratingSort === 'name') {
                    return String(a.label || '').localeCompare(String(b.label || ''), 'zh-CN', {numeric: true});
                }
                if (this.ratingSort === 'rating_desc') {
                    const ratingDiff = (this.normalizeRatingValue(b.rating) || 0) - (this.normalizeRatingValue(a.rating) || 0);
                    if (ratingDiff !== 0) return ratingDiff;
                    return String(a.label || '').localeCompare(String(b.label || ''), 'zh-CN', {numeric: true});
                }
                if (this.ratingSort === 'rating_asc') {
                    const ratingDiff = (this.normalizeRatingValue(a.rating) || 0) - (this.normalizeRatingValue(b.rating) || 0);
                    if (ratingDiff !== 0) return ratingDiff;
                    return String(a.label || '').localeCompare(String(b.label || ''), 'zh-CN', {numeric: true});
                }
                return 0;
            },

            filterAndSortTree(nodes) {
                const mapped = [];
                (nodes || []).forEach(node => {
                    if (node.is_file) {
                        if (this.matchesRatingFilter(node)) {
                            mapped.push({...node, rating: this.normalizeRatingValue(node.rating)});
                        }
                        return;
                    }

                    const children = this.filterAndSortTree(node.children || []);
                    if (children.length > 0) {
                        mapped.push({...node, children});
                    }
                });

                if (this.ratingSort === 'default') {
                    return mapped;
                }

                return mapped.sort((a, b) => {
                    if (a.is_file && b.is_file) return this.compareFileNodes(a, b);
                    if (a.is_file !== b.is_file) return a.is_file ? 1 : -1;
                    return String(a.label || '').localeCompare(String(b.label || ''), 'zh-CN', {numeric: true});
                });
            },

            buildRatingGroups(files) {
                const groups = [];
                [5, 4, 3, 2, 1, null].forEach(rating => {
                    const children = files
                        .filter(file => this.normalizeRatingValue(file.rating) === rating)
                        .sort((a, b) => this.compareFileNodes(a, b));
                    if (children.length === 0) return;
                    groups.push({
                        label: rating ? `${rating}星` : '未评级',
                        value: `rating-group-${rating || 'unrated'}`,
                        children,
                    });
                });
                return groups;
            },

            applyInputTreeView() {
                const raw = JSON.parse(JSON.stringify(this.rawInputTreeData || []));
                // 注入 customText 到文件节点
                const injectCustomText = (nodes) => {
                    (nodes || []).forEach(node => {
                        if (node.is_file) {
                            const key = node.value || node.key;
                            node._customText = this.customTexts[key] || '';
                        }
                        if (node.children) injectCustomText(node.children);
                    });
                };
                injectCustomText(raw);
                let visibleTree = [];
                if (this.ratingGroupMode) {
                    const files = this.collectInputFiles(raw).filter(file => this.matchesRatingFilter(file));
                    visibleTree = this.buildRatingGroups(files);
                } else {
                    visibleTree = this.filterAndSortTree(raw);
                }

                this.inputTreeData = visibleTree;
                this.visibleInputFiles = this.collectInputFiles(visibleTree);
                this.visibleThumbGroups = this.ratingGroupMode ? visibleTree.filter(node => node.children && node.children.length > 0) : [];
                this.visibleInputFileCount = this.visibleInputFiles.length;
                this.treeKey = (this.treeKey || 0) + 1;
                this.addDebugLog(
                    'info',
                    `星级视图: filter=${this.ratingFilter}, sort=${this.ratingSort}, group=${this.ratingGroupMode}, visible=${this.visibleInputFileCount}`
                );
            },

            selectAll() {
                const collectAllFiles = (nodes) => {
                    let files = [];
                    nodes.forEach(node => {
                        if (node.is_file) {
                            files.push(node.value || node.key);
                        } else if (node.children) {
                            files = files.concat(collectAllFiles(node.children));
                        }
                    });
                    return files;
                };

                const allFiles = collectAllFiles(this.inputTreeData);
                this.selectedItems = [...new Set([...this.selectedItems, ...allFiles])];
            },

            fileValue(file) {
                return file?.value || file?.key || '';
            },

            getVisibleFileValues() {
                return (this.visibleInputFiles || []).map(file => this.fileValue(file)).filter(Boolean);
            },

            getVisibleFileByValue(value) {
                return (this.visibleInputFiles || []).find(file => this.fileValue(file) === value) || null;
            },

            setSelectedItemsKeepingHidden(visibleValues, selectedVisibleValues) {
                const visibleSet = new Set(visibleValues);
                const nextVisible = new Set(selectedVisibleValues);
                const hiddenSelected = this.selectedItems.filter(value => !visibleSet.has(value));
                this.selectedItems = [...new Set([...hiddenSelected, ...nextVisible])];
            },

            setSingleSelection(value) {
                if (!value) return;
                this.selectedItems = [value];
                this.lastSelectedPath = value;
                this.addDebugLog('info', `selection: single ${value}`);
            },

            clearSelection() {
                this.selectedItems = [];
                this.lastSelectedPath = '';
                this.closeContextMenu();
                this.addDebugLog('info', 'selection: clear');
            },

            selectRangeTo(file, additive = false) {
                const value = this.fileValue(file);
                const visibleValues = this.getVisibleFileValues();
                if (!value || visibleValues.length === 0) return;
                const end = visibleValues.indexOf(value);
                const start = visibleValues.indexOf(this.lastSelectedPath);
                if (start < 0 || end < 0) {
                    if (additive) {
                        this.selectedItems = [...new Set([...this.selectedItems, value])];
                    } else {
                        this.setSelectedItemsKeepingHidden(visibleValues, [value]);
                    }
                    this.lastSelectedPath = value;
                    return;
                }
                const low = Math.min(start, end);
                const high = Math.max(start, end);
                const rangeValues = visibleValues.slice(low, high + 1);
                if (additive) {
                    this.selectedItems = [...new Set([...this.selectedItems, ...rangeValues])];
                } else {
                    this.setSelectedItemsKeepingHidden(visibleValues, rangeValues);
                }
                this.addDebugLog('info', `selection: range ${rangeValues.length}`);
            },

            selectFile(file, event = {}) {
                const value = this.fileValue(file);
                if (!value) return;
                const additive = !!(event.ctrlKey || event.metaKey);
                const range = !!event.shiftKey;

                if (range) {
                    this.selectRangeTo(file, additive);
                    this.lastSelectedPath = value;
                    return;
                }

                if (additive) {
                    if (this.selectedItems.includes(value)) {
                        this.selectedItems = this.selectedItems.filter(v => v !== value);
                    } else {
                        this.selectedItems = [...new Set([...this.selectedItems, value])];
                    }
                    this.lastSelectedPath = value;
                    this.addDebugLog('info', `selection: toggle ${value}`);
                    return;
                }

                if (event.fromCheckbox) {
                    if (this.selectedItems.includes(value)) {
                        this.selectedItems = this.selectedItems.filter(v => v !== value);
                    } else {
                        this.selectedItems = [...new Set([...this.selectedItems, value])];
                    }
                    this.lastSelectedPath = value;
                    return;
                }

                this.lastSelectedPath = value;
            },

            handleFileActivate(file, event = {}) {
                if (!file || !file.is_file) return;
                if (event.shiftKey || event.ctrlKey || event.metaKey) {
                    this.selectFile(file, event);
                } else {
                    this.lastSelectedPath = this.fileValue(file) || this.lastSelectedPath;
                }
                this.closeContextMenu();
                this.openPreviewFile(file);
            },

            toggleFileSelection(file, event = {}) {
                this.selectFile(file, {
                    fromCheckbox: true,
                    shiftKey: !!event.shiftKey,
                    ctrlKey: !!event.ctrlKey,
                    metaKey: !!event.metaKey
                });
            },

            handleFileListKeydown(event) {
                if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'a') {
                    event.preventDefault();
                    const visibleValues = this.getVisibleFileValues();
                    this.selectedItems = [...new Set([...this.selectedItems, ...visibleValues])];
                    if (visibleValues.length > 0) {
                        this.lastSelectedPath = visibleValues[visibleValues.length - 1];
                    }
                    this.addDebugLog('info', `selection: ctrl+a visible=${visibleValues.length}`);
                }
            },

            startMarqueeSelection(event) {
                if (event.button !== 0 || !this.inputTreeData || this.inputTreeData.length === 0) return;
                if (event.target.closest('button,input,select,textarea,a,.splitter-horizontal,.splitter-vertical')) return;
                if (event.target.closest('[data-file-item="input-file"]')) return;

                this.closeContextMenu();
                this.marquee.active = true;
                this.marquee.startX = event.clientX;
                this.marquee.startY = event.clientY;
                this.marquee.x = event.clientX;
                this.marquee.y = event.clientY;
                this.marquee.baseSelected = [...this.selectedItems];
                this.marquee.additive = !!(event.ctrlKey || event.metaKey);
                event.preventDefault();

                const onMove = (moveEvent) => {
                    if (!this.marquee.active) return;
                    this.marquee.x = moveEvent.clientX;
                    this.marquee.y = moveEvent.clientY;
                    this.updateMarqueeSelection();
                };

                const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    const count = this.selectedItems.length;
                    this.marquee.active = false;
                    this.addDebugLog('info', `selection: marquee total=${count}`);
                };

                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp, {once: true});
            },

            updateMarqueeSelection() {
                const left = Math.min(this.marquee.startX, this.marquee.x);
                const right = Math.max(this.marquee.startX, this.marquee.x);
                const top = Math.min(this.marquee.startY, this.marquee.y);
                const bottom = Math.max(this.marquee.startY, this.marquee.y);
                if ((right - left) < 3 && (bottom - top) < 3) return;

                const area = this.$refs.inputFileArea;
                const nodes = area ? area.querySelectorAll('[data-file-item="input-file"][data-file-path]') : [];
                const hitValues = [];
                nodes.forEach(node => {
                    const rect = node.getBoundingClientRect();
                    const hit = rect.left <= right && rect.right >= left && rect.top <= bottom && rect.bottom >= top;
                    if (hit) hitValues.push(node.dataset.filePath);
                });

                const visibleValues = this.getVisibleFileValues();
                if (this.marquee.additive) {
                    this.selectedItems = [...new Set([...this.marquee.baseSelected, ...hitValues])];
                } else {
                    const hiddenSelected = this.marquee.baseSelected.filter(value => !visibleValues.includes(value));
                    this.selectedItems = [...new Set([...hiddenSelected, ...hitValues])];
                }
                if (hitValues.length > 0) {
                    this.lastSelectedPath = hitValues[hitValues.length - 1];
                }
            },

            openContextMenu(file, event) {
                if (!file || !file.is_file) return;
                const width = 192;
                const height = 230;
                this.contextMenu = {
                    show: true,
                    x: Math.min(event.clientX, window.innerWidth - width - 8),
                    y: Math.min(event.clientY, window.innerHeight - height - 8),
                    file
                };
                this.lastSelectedPath = this.fileValue(file) || this.lastSelectedPath;
                this.addDebugLog('info', `contextmenu: ${this.fileValue(file)}`);
            },

            closeContextMenu() {
                this.contextMenu.show = false;
            },

            contextPreview() {
                if (this.contextMenu.file) this.openPreviewFile(this.contextMenu.file);
                this.closeContextMenu();
            },

            contextSelectOnly() {
                const value = this.fileValue(this.contextMenu.file);
                if (value) this.setSingleSelection(value);
                this.closeContextMenu();
            },

            contextToggleSelection() {
                if (this.contextMenu.file) this.selectFile(this.contextMenu.file, {fromCheckbox: true});
                this.closeContextMenu();
            },

            contextSelectSameRating() {
                const file = this.contextMenu.file;
                if (!file) return;
                const rating = this.normalizeRatingValue(file.rating);
                const matches = (this.visibleInputFiles || [])
                    .filter(item => this.normalizeRatingValue(item.rating) === rating)
                    .map(item => this.fileValue(item))
                    .filter(Boolean);
                this.selectedItems = [...new Set([...this.selectedItems, ...matches])];
                this.closeContextMenu();
                this.addDebugLog('info', `selection: same rating ${rating || 'unrated'} count=${matches.length}`);
            },

            async contextCopyPath() {
                const value = this.fileValue(this.contextMenu.file);
                if (!value) return;
                try {
                    await navigator.clipboard.writeText(value);
                    this.toast('路径已复制', 'success');
                } catch (e) {
                    this.toast('复制失败: ' + e.message, 'error');
                }
                this.closeContextMenu();
            },

            contextOpenLocation() {
                const value = this.fileValue(this.contextMenu.file);
                if (!value) return;
                const dir = value.replace(/[/\\][^/\\]*$/, '');
                // 尝试通过后端 API 打开文件管理器
                fetch('/api/v1/open-folder?path=' + encodeURIComponent(dir))
                    .catch(() => {});
                this.closeContextMenu();
                this.toast('正在打开文件位置...', 'info');
            },

            openPreviewFile(file) {
                if (!file || !file.is_file) return;
                const value = file.value || file.key;
                if (!value) return;
                if (this.preview.renderedObjectUrl) {
                    URL.revokeObjectURL(this.preview.renderedObjectUrl);
                }
                this.preview.url = `/api/v1/file?path=${encodeURIComponent(value)}`;
                this.preview.name = file.label || file.title || file.name || value;
                this.preview.path = value;
                this.preview.renderedObjectUrl = '';
                this.preview.isFile = true;
                this.addDebugLog('info', `预览文件: ${this.preview.name} -> ${value}`);
            },

            thumbUrl(file) {
                const value = file?.value || file?.key || '';
                return `/api/v1/file/thumb?size=256&path=${encodeURIComponent(value)}`;
            },

            formatRatingLabel(value) {
                const rating = this.normalizeRatingValue(value);
                if (!rating) return '未评级';
                return '★★★★★'.slice(0, rating) + '☆☆☆☆☆'.slice(0, 5 - rating);
            },

            resetPreviewImage() {
                if (!this.preview.path) return;
                if (this.preview.renderedObjectUrl) {
                    URL.revokeObjectURL(this.preview.renderedObjectUrl);
                }
                this.preview.renderedObjectUrl = '';
                this.preview.url = `/api/v1/file?path=${encodeURIComponent(this.preview.path)}`;
            },

            setCurrentCustomText(value) {
                if (!this.preview.path) return;
                if (value) {
                    this.customTexts[this.preview.path] = value;
                } else {
                    delete this.customTexts[this.preview.path];
                }
                this.addDebugLog('info', `设置自定义内容: ${this.preview.name || this.preview.path} -> ${value || '(空)'}`);
                this.resetPreviewImage();
                // 保存到服务端缓存
                this.saveCustomTextToCache(this.preview.path, value || '');
            },

            async saveCustomTextToCache(path, text) {
                try {
                    await fetch('/api/v1/cache/custom-text', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({path, text})
                    });
                } catch (_) { /* 静默失败 */ }
            },

            async saveCustomTextsToCache(customTexts) {
                if (!customTexts || Object.keys(customTexts).length === 0) return;
                try {
                    const res = await fetch('/api/v1/cache/custom-texts', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({customTexts})
                    });
                    if (res.ok) {
                        this.addDebugLog('info', `saved custom texts batch: ${Object.keys(customTexts).length}`);
                        await this.fetchCacheStats();
                    } else {
                        this.addDebugLog('error', `save custom texts batch failed: ${res.status}`);
                    }
                } catch (e) {
                    this.addDebugLog('error', 'save custom texts batch failed: ' + e.message);
                }
            },

            async loadCustomTextsFromCache() {
                try {
                    const res = await fetch('/api/v1/cache/custom-texts');
                    if (!res.ok) return;
                    const data = await res.json();
                    const texts = data.custom_texts || {};
                    // 合并缓存中的自定义文本到前端状态
                    Object.entries(texts).forEach(([path, text]) => {
                        if (text && !this.customTexts[path]) {
                            this.customTexts[path] = text;
                        }
                    });
                    this.addDebugLog('info', `从缓存加载 ${Object.keys(texts).length} 条自定义文本`);
                    this.applyInputTreeView();
                } catch (e) {
                    this.addDebugLog('error', '加载自定义文本缓存失败: ' + e.message);
                }
            },

            async fetchCacheStats() {
                try {
                    const res = await fetch('/api/v1/cache/stats');
                    if (res.ok) {
                        this.cacheStats = await res.json();
                    }
                } catch (_) {}
            },

            async clearAllCache() {
                if (!confirm(`确定要清空 EXIF/星级缓存吗？\n\n地点标签会被保留。`)) return;
                try {
                    const res = await fetch('/api/v1/cache', { method: 'DELETE' });
                    if (res.ok) {
                        this.toast('缓存已清空，地点标签已保留', 'success');
                        await this.fetchCacheStats();
                    } else {
                        this.toast('清空失败', 'error');
                    }
                } catch (e) {
                    this.toast('清空失败: ' + e.message, 'error');
                }
            },

            async clearCustomTextCache() {
                if (!confirm(`Clear all saved location tags?\n\nThis cannot be undone.`)) return;
                try {
                    const res = await fetch('/api/v1/cache/custom-texts', { method: 'DELETE' });
                    if (res.ok) {
                        this.customTexts = {};
                        this.applyInputTreeView();
                        await this.fetchCacheStats();
                        this.toast('Location tags cleared', 'success');
                    } else {
                        this.toast('Clear location tags failed', 'error');
                    }
                } catch (e) {
                    this.toast('Clear location tags failed: ' + e.message, 'error');
                }
            },

            setCurrentWatermarkFont(value) {
                if (!this.preview.path) return;
                if (value) {
                    this.watermarkFonts[this.preview.path] = value;
                } else {
                    delete this.watermarkFonts[this.preview.path];
                }
                this.addDebugLog('info', `设置单张字体: ${this.preview.name || this.preview.path} -> ${value || '继承全局'}`);
                this.resetPreviewImage();
            },

            async renderPreview() {
                if (!this.preview.path) return;
                this.loading.preview = true;
                this.addDebugLog('request', `POST /api/v1/preview/render path=${this.preview.path}, template=${this.config.template_name}, text=${this.currentCustomText || '(空)'}, font=${this.currentWatermarkFont || this.globalWatermarkFont || '默认'}`);
                try {
                    const response = await fetch('/api/v1/preview/render', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            path: this.preview.path,
                            customText: this.currentCustomText,
                            watermarkFont: this.currentWatermarkFont || this.globalWatermarkFont,
                            templateName: this.config.template_name
                        })
                    });
                    this.addDebugLog('request', `POST /api/v1/preview/render -> ${response.status} ${response.statusText}`);

                    if (!response.ok) {
                        const text = await response.text();
                        this.addDebugLog('error', `预览接口错误响应: ${text}`);
                        throw new Error(text || `HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    this.addDebugLog('info', `预览图片大小: ${blob.size} bytes`);
                    if (this.preview.renderedObjectUrl) {
                        URL.revokeObjectURL(this.preview.renderedObjectUrl);
                    }
                    const objectUrl = URL.createObjectURL(blob);
                    this.preview.renderedObjectUrl = objectUrl;
                    this.preview.url = objectUrl;
                    this.addDebugLog('success', '预览已刷新');
                    this.toast('预览已刷新', 'success');
                } catch (e) {
                    this.addDebugLog('error', '预览生成失败: ' + e.message);
                    this.toast('预览生成失败: ' + e.message, 'error');
                } finally {
                    this.loading.preview = false;
                    this.addDebugLog('info', '预览请求结束');
                }
            },

            async startProcess() {
                // 重置进度状态
                this.progress.active = true;
                this.progress.complete = false;
                this.progress.total = this.selectedItems.length;
                this.progress.processed = 0;
                this.progress.success = 0;
                this.progress.failure = 0;
                this.progress.skipped = 0;
                this.progress.percent = 0;
                this.progress.current = '';
                this.progress.message = '准备处理...';
                this.progress.completeMessage = '';
                this.addDebugLog('request', `POST /api/v1/start_process selected=${this.selectedItems.length}`);
                this.addDebugLog('info', `处理文件: ${JSON.stringify(this.selectedItems)}`);
                this.addDebugLog('info', `自定义内容: ${JSON.stringify(this.customTexts)}`);
                this.addDebugLog('info', `全局字体: ${this.globalWatermarkFont || '模板默认字体'}`);
                this.addDebugLog('info', `单张字体覆盖: ${JSON.stringify(this.watermarkFonts)}`);

                try {
                    const response = await fetch('/api/v1/start_process', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            selectedItems: this.selectedItems,
                            customTexts: this.customTexts,
                            watermarkFonts: this.watermarkFonts,
                            watermarkFont: this.globalWatermarkFont
                        })
                    });
                    this.addDebugLog('request', `POST /api/v1/start_process -> ${response.status} ${response.statusText}`);

                    if (!response.ok) {
                        throw new Error('服务端错误');
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let currentEvent = '';

                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, {stream: true});
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || ''; // 保留不完整的行

                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                currentEvent = line.replace('event:', '').trim();
                            } else if (line.startsWith('data:')) {
                                const jsonStr = line.replace('data:', '').trim();
                                try {
                                    const data = JSON.parse(jsonStr);

                                    // 更新进度数据
                                    if (data.total !== undefined) this.progress.total = data.total;
                                    if (data.processed !== undefined) this.progress.processed = data.processed;
                                    if (data.success !== undefined) this.progress.success = data.success;
                                    if (data.failure !== undefined) this.progress.failure = data.failure;
                                    if (data.skipped !== undefined) this.progress.skipped = data.skipped;
                                    if (data.percent !== undefined) this.progress.percent = data.percent;
                                    if (data.current !== undefined) this.progress.current = data.current;
                                    if (data.message !== undefined) this.progress.message = data.message;
                                    this.addDebugLog('sse', `${currentEvent || 'message'} ${JSON.stringify(data)}`);

                                    // 处理完成事件
                                    if (currentEvent === 'complete') {
                                        this.progress.complete = true;
                                        this.progress.completeMessage = data.message || '处理完成';
                                        this.addDebugLog(data.failure > 0 ? 'warn' : 'success', data.message || '处理完成');
                                    }
                                } catch (e) {
                                    console.error('解析 SSE 数据失败:', e, jsonStr);
                                    this.addDebugLog('error', `解析 SSE 数据失败: ${e.message}; raw=${jsonStr}`);
                                }
                                currentEvent = ''; // 重置事件类型
                            }
                        }
                    }

                    // 等待 SSE 连接完全关闭后再刷新文件列表
                    console.log('[startProcess] SSE 完成，等待连接关闭...');
                    this.addDebugLog('info', 'SSE 完成，刷新文件列表');
                    await new Promise(resolve => setTimeout(resolve, 500));
                    await this.fetchFiles(false);

                } catch (e) {
                    this.addDebugLog('error', '网络请求失败: ' + e.message);
                    this.toast('网络请求失败: ' + e.message, 'error');
                    this.progress.active = false;
                }

                // 延迟关闭进度显示，让用户看到最终状态
                setTimeout(() => {
                    if (this.progress.complete) {
                        this.progress.active = false;
                    }
                }, 3000);
            },

            normalizeApiResponse(json) {
                if (json && json.data && json.status === 0) return json.data;
                if (json && json.data) return json.data;
                return json;
            }
        }
    }
</script>
