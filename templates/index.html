<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        danger: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'spin-slow': 'spin 1s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.24.1/ace.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.24.1/mode-json.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css" crossorigin="anonymous">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0" crossorigin="anonymous"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        .ace_editor {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .tree-node {
            transition: all 0.15s ease;
        }

        .tree-node:hover {
            background: linear-gradient(90deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .config-label {
            @apply text-xs font-semibold text-slate-600 uppercase tracking-wide;
        }

        .workbench-grid {
            display: grid;
            grid-template-columns:
                minmax(240px, var(--left-pane, 25%))
                10px
                minmax(320px, var(--center-pane, 50%))
                10px
                minmax(280px, 1fr);
            gap: 0;
            height: 100%;
        }

        .splitter-vertical,
        .splitter-horizontal,
        .splitter-log {
            touch-action: none;
            user-select: none;
        }

        .splitter-vertical {
            cursor: col-resize;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .splitter-vertical::after {
            content: "";
            width: 2px;
            margin: 0 4px;
            border-radius: 999px;
            background: #cbd5e1;
            opacity: 0.6;
        }

        .splitter-vertical:hover::after,
        .splitter-horizontal:hover,
        .splitter-log:hover {
            background: #38bdf8;
            opacity: 1;
        }

        .splitter-horizontal {
            height: 10px;
            cursor: row-resize;
            border-radius: 999px;
            background: #e2e8f0;
            margin: 8px 0;
            opacity: 0.7;
        }

        .splitter-log {
            height: 6px;
            cursor: row-resize;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        .file-split {
            display: grid;
            grid-template-rows: minmax(160px, var(--input-pane, 65%)) 10px minmax(120px, 1fr);
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
            gap: 0.75rem;
        }

        .thumb-card {
            height: 14.25rem;
        }

        .thumb-card-image {
            height: 10rem;
        }

        .thumb-card-meta {
            height: 4.25rem;
        }

        @media (max-width: 1023px) {
            body {
                overflow: auto;
            }

            .workbench-grid {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                height: auto;
                min-height: 100%;
            }

            .splitter-vertical,
            .splitter-horizontal {
                display: none;
            }

            .file-split {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 h-screen w-full flex flex-col overflow-hidden text-sm"
      x-data="app()" x-init="init()" @keydown.window.escape="closeContextMenu()">

<!-- 顶部导航 -->
<header class="glass-effect border-b border-slate-200/50 h-16 flex items-center px-6 shadow-sm shrink-0 z-20">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-primary-500/30">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </div>
        <div>
            <h1 class="font-bold text-lg text-slate-800 tracking-tight">{{ title }}</h1>
            <p class="text-xs text-slate-400">v{{version}}</p>
        </div>
    </div>
</header>

<!-- 主布局 -->
<main class="flex-1 p-5 overflow-hidden">
    <div class="workbench-grid">

        <!-- Col 1: 配置管理 -->
        <div class="flex flex-col h-full bg-white/80 backdrop-blur rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200/50 overflow-hidden animate-fade-in min-w-0">
            <div class="px-5 py-4 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <h3 class="font-bold text-slate-700">配置管理</h3>
                </div>
                <span class="text-xs px-2.5 py-1 rounded-full font-medium transition-all duration-200"
                      :class="isStatic ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
                      x-text="isStatic ? '已保存' : '编辑中'"></span>
            </div>

            <div class="p-5 flex-1 overflow-y-auto space-y-4">
                <div class="space-y-1">
                    <label class="block config-label">输入文件夹</label>
                    <div class="relative">
                        <input type="text" x-model="config.input_folder" :disabled="isStatic"
                               class="w-full h-10 pl-10 pr-4 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-400 text-sm">
                        <svg class="w-5 h-5 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                        </svg>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block config-label">输出文件夹</label>
                    <div class="relative">
                        <label>
                            <input type="text" x-model="config.output_folder" :disabled="isStatic"
                                   class="w-full h-10 pl-10 pr-4 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-400 text-sm">
                        </label>
                        <svg class="w-5 h-5 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                        </svg>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <label for="override_existed"
                           class="config-label cursor-pointer transition-colors duration-200"
                           :class="config.override_existed ? 'text-red-600 font-medium' : ''">
                        覆盖已存在
                    </label>
                    <input type="checkbox"
                           x-model="config.override_existed"
                           :disabled="isStatic"
                           id="override_existed"
                           class="w-4 h-4 rounded border-slate-300 focus:ring-2 disabled:opacity-50 cursor-pointer transition-all duration-200"
                           :class="config.override_existed ? 'accent-red-600' : 'accent-primary-500'">
                </div>

                <div class="flex items-center gap-2">
                    <label for="preserve_exif"
                           class="config-label cursor-pointer transition-colors duration-200"
                           :class="config.preserve_exif ? 'text-primary-600 font-medium' : 'text-slate-400'">
                        保留 EXIF 元数据
                    </label>
                    <input type="checkbox"
                           x-model="config.preserve_exif"
                           :disabled="isStatic"
                           id="preserve_exif"
                           class="w-4 h-4 rounded border-slate-300 focus:ring-2 disabled:opacity-50 cursor-pointer transition-all duration-200 accent-primary-500">
                </div>

                <div class="flex items-center gap-2">
                    <label for="scan_subdirectories"
                           class="config-label cursor-pointer transition-colors duration-200"
                           :class="config.scan_subdirectories ? 'text-primary-600 font-medium' : 'text-slate-400'">
                        扫描子目录
                    </label>
                    <input type="checkbox"
                           x-model="config.scan_subdirectories"
                           :disabled="isStatic"
                           id="scan_subdirectories"
                           class="w-4 h-4 rounded border-slate-300 focus:ring-2 disabled:opacity-50 cursor-pointer transition-all duration-200 accent-primary-500">
                </div>

                <div class="space-y-1">
                    <label class="config-label">输出质量: <span x-text="config.quality" class="text-primary-600 font-bold"></span>%</label>
                    <div class="flex items-center gap-3">
                        <input type="range" x-model="config.quality" :disabled="isStatic"
                               min="60" max="100" step="1"
                               class="flex-1 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-primary-500 disabled:opacity-50">
                        <input type="number" x-model="config.quality" :disabled="isStatic"
                               min="60" max="100" step="1"
                               class="w-16 h-10 px-3 text-center rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all disabled:bg-slate-50">
                    </div>
                </div>

                <div class="flex-1 flex flex-col min-h-[300px]">
                    <div class="flex items-center justify-between mb-2">
                        <label class="config-label">模板配置</label>
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-slate-500">选择模板:</label>
                            <select x-model="config.template_name"
                                    @change="switchTemplate($event.target.value)"
                                    :disabled="isStatic"
                                    class="h-8 px-2 text-xs rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all disabled:bg-slate-50 disabled:opacity-50">
                                <template x-for="template in availableTemplates" :key="template">
                                    <option :value="template" x-text="template"></option>
                                </template>
                            </select>
                            <button @click="createNewTemplate()"
                                    :disabled="isStatic"
                                    title="新建空白模板"
                                    class="h-8 px-2 text-xs rounded-lg border border-slate-200 hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-600 text-slate-500 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                                新建
                            </button>
                            <button @click="saveAsTemplate()"
                                    title="另存为新模板"
                                    class="h-8 px-2 text-xs rounded-lg border border-slate-200 hover:bg-primary-50 hover:border-primary-300 hover:text-primary-600 text-slate-500 transition-all flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                                </svg>
                                另存为
                            </button>
                        </div>
                    </div>
                    <div id="json-editor" class="w-full flex-1 min-h-[300px] rounded-xl"></div>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100 bg-gradient-to-r from-slate-50 to-white">
                <template x-if="isStatic">
                    <button @click="enableEdit()"
                            class="w-full py-2.5 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white rounded-xl font-medium shadow-lg shadow-primary-500/30 transition-all duration-200 flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        编辑配置
                    </button>
                </template>
                <template x-if="!isStatic">
                    <div class="flex gap-2">
                        <button @click="resetConfig()"
                                class="flex-1 py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-medium transition-all duration-200">
                            取消
                        </button>
                        <button @click="saveConfig()"
                                class="flex-1 py-2.5 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white rounded-xl font-medium shadow-lg shadow-primary-500/30 transition-all duration-200">
                            保存配置
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <div class="splitter-vertical" @pointerdown="startPaneResize($event, 'left')" title="拖动调整配置区宽度"></div>

        <!-- Col 2: 文件树 -->
        <div class="flex flex-col h-full bg-white/80 backdrop-blur rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200/50 overflow-hidden animate-slide-up min-w-0" style="animation-delay: 0.1s">
            <div class="px-5 py-4 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    <h3 class="font-bold text-slate-700">文件列表</h3>
                </div>
                <button @click="fetchFiles()"
                        class="p-2 rounded-lg hover:bg-primary-50 text-slate-400 hover:text-primary-600 transition-all duration-200">
                    <svg class="w-5 h-5" :class="{'animate-spin': loading.files}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <div class="flex-1 overflow-hidden p-5 file-split">

                <!-- 输入树 -->
                <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
                    <div class="flex items-center justify-between mb-2 pb-2 border-b border-slate-100 shrink-0">
                        <div class="flex items-center gap-2">
                            <span class="config-label">输入文件</span>
                            <span class="text-xs px-2 py-0.5 bg-primary-100 text-primary-700 rounded-full font-medium"
                                  x-text="`${selectedItems.length} 已选中`"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex rounded-lg bg-slate-100 p-0.5">
                                <button @click="setFileViewMode('list')"
                                        class="h-7 px-2 rounded-md text-[11px] font-medium transition-all"
                                        :class="layoutPrefs.fileViewMode === 'list' ? 'bg-white text-primary-600 shadow-sm' : 'text-slate-500'">列表</button>
                                <button @click="setFileViewMode('thumb')"
                                        class="h-7 px-2 rounded-md text-[11px] font-medium transition-all"
                                        :class="layoutPrefs.fileViewMode === 'thumb' ? 'bg-white text-primary-600 shadow-sm' : 'text-slate-500'">缩略图</button>
                            </div>
                            <button @click="resetLayoutPrefs()" class="text-xs text-slate-500 hover:text-primary-700 font-medium">重置布局</button>
                            <button @click="selectAll()" class="text-xs text-primary-600 hover:text-primary-700 font-medium">全选</button>
                        </div>
                    </div>

                    <div class="mb-2 grid grid-cols-2 gap-2 shrink-0">
                        <select x-model="ratingFilter"
                                @change="applyInputTreeView()"
                                class="h-8 px-2 rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-xs bg-white">
                            <option value="all">全部星级</option>
                            <option value="unrated">未评级</option>
                            <option value="5">5星</option>
                            <option value="4">4星</option>
                            <option value="3">3星</option>
                            <option value="2">2星</option>
                            <option value="1">1星</option>
                            <option value="gte5">≥5星</option>
                            <option value="gte4">≥4星</option>
                            <option value="gte3">≥3星</option>
                            <option value="gte2">≥2星</option>
                            <option value="gte1">≥1星</option>
                        </select>
                        <select x-model="ratingSort"
                                @change="applyInputTreeView()"
                                class="h-8 px-2 rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-xs bg-white">
                            <option value="default">默认时间</option>
                            <option value="name">文件名</option>
                            <option value="rating_desc">星级高到低</option>
                            <option value="rating_asc">星级低到高</option>
                        </select>
                        <button @click="ratingGroupMode = !ratingGroupMode; applyInputTreeView()"
                                class="col-span-2 h-8 px-2 rounded-lg border text-xs font-medium transition-all"
                                :class="ratingGroupMode ? 'border-amber-300 bg-amber-50 text-amber-700' : 'border-slate-200 bg-white text-slate-500 hover:text-slate-700'">
                            <span x-text="ratingGroupMode ? '已按星级分类' : '按星级分类'"></span>
                            <span class="ml-2 text-[11px] text-slate-400" x-text="`${visibleInputFileCount} 可见`"></span>
                        </button>
                    </div>

                    <div x-ref="inputFileArea"
                         tabindex="0"
                         class="relative flex-1 overflow-y-auto pr-2 select-none"
                         @keydown="handleFileListKeydown($event)"
                         @pointerdown="startMarqueeSelection($event)">
                        <!-- Loading -->
                        <div x-show="loading.files" class="flex flex-col items-center justify-center py-12 text-slate-400">
                            <svg class="animate-spin h-8 w-8 text-primary-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span class="text-sm">正在扫描文件系统...</span>
                        </div>

                        <!-- Empty -->
                        <div x-show="!loading.files && (!inputTreeData || inputTreeData.length === 0)"
                             class="text-center py-12">
                            <svg class="w-16 h-16 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M12 12h.01M12 16h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

                                                                            </span>
                                                                            <span class="mr-2" x-show="hasChildren" x-html="folderIcon"></span>
                                                                            <span class="mr-2" x-show="!hasChildren" x-html="fileIcon"></span>
                                                                            <span class="flex-1 text-xs font-medium text-slate-700 truncate" x-text="label"></span>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="splitter-vertical" @pointerdown="startPaneResize($event, 'center')" title="拖动调整文件区宽度"></div>

        <!-- Col 3: 预览与执行 -->
        <div class="flex flex-col h-full gap-5 min-w-0">

            <!-- 预览卡片 -->
            <div class="flex-1 bg-white/80 backdrop-blur rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200/50 flex flex-col overflow-hidden animate-slide-up" style="animation-delay: 0.2s">
                <div class="px-5 py-4 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <h3 class="font-bold text-slate-700">图片预览</h3>
                    </div>
                </div>

                <div x-show="preview.url && preview.isFile" class="px-5 py-3 border-b border-slate-100 bg-white/80 space-y-2">
                    <div class="flex gap-2">
                        <input type="text"
                               :value="currentCustomText"
                               @input="setCurrentCustomText($event.target.value)"
                               placeholder="地名/景点"
                               class="flex-1 h-9 px-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all text-sm bg-white">
                        <button @click="renderPreview()"
                                :disabled="loading.preview || !preview.path"
                                class="h-9 px-3 rounded-xl bg-primary-500 hover:bg-primary-600 text-white text-xs font-medium shadow-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-text="loading.preview ? '生成中...' : '刷新预览'"></span>
                        </button>
                    </div>
                    <select :value="currentWatermarkFont"
                            @change="setCurrentWatermarkFont($event.target.value)"
                            class="h-9 w-full px-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all text-sm bg-white">
                        <option value="">继承全局字体</option>
                        <template x-for="font in availableFonts" :key="font">
                            <option :value="font" x-text="font"></option>
                        </template>
                    </select>
                    <div class="grid grid-cols-[72px_1fr] gap-2 items-center">
                        <span class="text-[10px] text-slate-400 font-medium">全局字体</span>
                        <select x-model="globalWatermarkFont"
                                @change="setGlobalWatermarkFont($event.target.value)"
                                class="h-8 w-full px-2 rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all text-xs bg-white">
                            <option value="">模板默认字体</option>
                            <template x-for="font in availableFonts" :key="font">
                                <option :value="font" x-text="font"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <!-- 地点预设标签（有预览图时可见） -->
                <div x-show="preview.url && preview.isFile" class="px-5 py-2 border-b border-slate-100 bg-white/80 space-y-1.5">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] text-slate-400 font-medium">地点预设 <span x-text="'('+presets.length+')'" class="text-slate-300"></span></span>
                        <div class="flex items-center gap-1">
                            <button @click="addCurrentTextAsPreset()"
                                    :disabled="!currentCustomText"
                                    title="将当前地名保存为预设"
                                    class="text-[10px] px-2 py-0.5 rounded-lg border border-violet-200 text-violet-600 hover:bg-violet-50 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
                                + 存为预设
                            </button>
                            <button @click="showPresetManager = !showPresetManager"
                                    class="text-[10px] px-2 py-0.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition-all"
                                    x-text="showPresetManager ? '收起' : '管理'"></button>
                        </div>
                    </div>
                    <!-- 预设标签行 -->
                    <div x-show="presets && presets.length > 0" class="flex flex-wrap gap-1">
                        <template x-for="(preset, idx) in presets" :key="idx">
                            <span class="group flex items-center gap-0.5">
                                <button @click="applyPresetToCurrent(preset)"
                                        @dblclick="applyPresetToSelected(preset)"
                                        class="text-[10px] px-2 py-0.5 rounded-full bg-violet-50 text-violet-700 hover:bg-violet-100 border border-violet-200 transition-all cursor-pointer"
                                        x-text="preset"
                                        :title="'单击应用到当前文件，双击批量应用到所有选中文件'"></button>
                                <button x-show="showPresetManager"
                                        @click="removePreset(idx)"
                                        class="text-[9px] text-slate-400 hover:text-red-500 transition-all leading-none">&times;</button>
                            </span>
                        </template>
                    </div>
                    <!-- 预设管理器 — 添加新预设 -->
                    <div x-show="showPresetManager" class="flex gap-1 pt-1">
                        <input type="text" x-model="newPresetText"
                               @keydown.enter="addPreset()"
                               placeholder="输入新预设地名..."
                               class="flex-1 h-7 px-2 text-[11px] rounded-lg border border-slate-200 focus:border-violet-400 focus:ring-1 focus:ring-violet-400/30 outline-none bg-white">
                        <button @click="addPreset()"
                                :disabled="!newPresetText.trim()"
                                class="h-7 px-3 text-[10px] rounded-lg bg-violet-500 hover:bg-violet-600 text-white font-medium disabled:opacity-30 transition-all">
                            添加
                        </button>
                    </div>
                    <p class="text-[9px] text-slate-300 leading-tight">
                        <strong>单击</strong>应用到当前预览 · <strong>双击</strong>批量应用到全部选中文件
                    </p>
                </div>

                <!-- 底部居中信息水印 — 逐行设置面板（仅该模式可见） -->
                <div x-show="isBottomCenterMode" x-transition class="px-3 py-2 border-b border-slate-100 bg-white/80 space-y-2">
                    <div class="flex items-center justify-between cursor-pointer" @click="showBottomCenterSettings = !showBottomCenterSettings">
                        <div class="flex items-center gap-2">
                            <svg class="w-3.5 h-3.5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                            </svg>
                            <span class="text-[11px] font-semibold text-slate-600">逐行设置</span>
                            <span class="text-[9px] px-1.5 py-0.5 bg-violet-100 text-violet-600 rounded-full font-medium">独立</span>
                        </div>
                        <svg class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200" :class="showBottomCenterSettings ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>

                    <div x-show="showBottomCenterSettings" x-transition class="space-y-2">

                        <!-- 标签页切换 -->
                        <div class="flex gap-1 bg-slate-100 rounded-lg p-0.5">
                            <template x-for="tab in [
                                {key:'location',  icon:'📍', label:'地点'},
                                {key:'time',      icon:'🕐', label:'时间'},
                                {key:'parameter', icon:'📷', label:'参数'}
                            ]" :key="tab.key">
                                <button @click="bottomCenterActiveTab = tab.key"
                                        class="flex-1 py-1.5 text-[10px] font-medium rounded-md transition-all duration-150"
                                        :class="bottomCenterActiveTab === tab.key
                                            ? 'bg-white text-violet-600 shadow-sm'
                                            : 'text-slate-500 hover:text-slate-700'"
                                        x-text="tab.icon + ' ' + tab.label"></button>
                            </template>
                        </div>

                        <!-- 当前标签页的 4 个控件（单行横排） -->
                        <div class="flex gap-2 items-end">
                            <!-- 透明度滑块 -->
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between mb-0.5">
                                    <span class="text-[9px] text-slate-400">透明度</span>
                                    <span class="text-[9px] text-slate-300"
                                          x-text="Math.round((bottomCenterSettings[bottomCenterActiveTab]?.opacity || 0)/2.55)+'%'"></span>
                                </div>
                                <input type="range" min="0" max="255" step="1"
                                       :value="bottomCenterSettings[bottomCenterActiveTab]?.opacity || 0"
                                       @input="updateBottomCenterSetting(bottomCenterActiveTab, 'opacity', $event.target.value)"
                                       class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-violet-500">
                            </div>
                            <!-- 字体 -->
                            <div class="w-[84px] shrink-0">
                                <label class="text-[9px] text-slate-400 block mb-0.5">字体</label>
                                <select :value="bottomCenterSettings[bottomCenterActiveTab]?.font || ''"
                                        @change="updateBottomCenterSetting(bottomCenterActiveTab, 'font', $event.target.value)"
                                        class="w-full h-7 px-1 text-[10px] rounded-lg border border-slate-200 focus:border-violet-400 focus:ring-1 focus:ring-violet-400/30 outline-none bg-white">
                                    <option value="">默认</option>
                                    <template x-for="font in availableFonts" :key="font">
                                        <option :value="font" x-text="font"></option>
                                    </template>
                                </select>
                            </div>
                            <!-- 字号 -->
                            <div class="w-[60px] shrink-0">
                                <label class="text-[9px] text-slate-400 block mb-0.5">字号</label>
                                <div class="relative">
                                    <input type="number" min="0.1" max="50" step="0.01"
                                           :value="bottomCenterSettings[bottomCenterActiveTab]?.height || 0"
                                           @input="updateBottomCenterSetting(bottomCenterActiveTab, 'height', $event.target.value)"
                                           class="w-full h-7 pl-1 pr-5 text-[10px] rounded-lg border border-slate-200 focus:border-violet-400 focus:ring-1 focus:ring-violet-400/30 outline-none bg-white">
                                    <span class="absolute right-1 top-1.5 text-[9px] text-slate-300 leading-none">vh</span>
                                </div>
                            </div>
                            <!-- 距底部 -->
                            <div class="w-[60px] shrink-0">
                                <label class="text-[9px] text-slate-400 block mb-0.5">距底</label>
                                <div class="relative">
                                    <input type="number" min="0" max="100" step="0.01"
                                           :value="bottomCenterSettings[bottomCenterActiveTab]?.bottom || 0"
                                           @input="updateBottomCenterSetting(bottomCenterActiveTab, 'bottom', $event.target.value)"
                                           class="w-full h-7 pl-1 pr-5 text-[10px] rounded-lg border border-slate-200 focus:border-violet-400 focus:ring-1 focus:ring-violet-400/30 outline-none bg-white">
                                    <span class="absolute right-1 top-1.5 text-[9px] text-slate-300 leading-none">vh</span>
                                </div>
                            </div>
                        </div>

                        <!-- 应用提示 -->
                        <p class="text-[9px] text-slate-400 text-center leading-tight">
                            修改后点 <strong class="text-violet-500">刷新预览</strong> 查看，确认后 <strong class="text-violet-500">保存配置</strong>
                        </p>
                    </div>
                </div>

                <div class="flex-1 bg-gradient-to-br from-slate-50 to-slate-100/50 flex items-center justify-center p-4 relative overflow-hidden">
                    <!-- Empty -->
                    <div x-show="!preview.url || !preview.isFile" class="text-center">
                        <div class="w-20 h-20 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center">
                            <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <span class="text-xs text-slate-400">点击文件预览</span>
                    </div>

                    <!-- Image -->
                    <div x-show="preview.url && preview.isFile"
                         class="w-full h-full flex flex-col"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 transform scale-95"
                         x-transition:enter-end="opacity-100 transform scale-100">
                        <div class="text-xs text-center text-slate-500 mb-2 font-mono truncate bg-white/90 backdrop-blur py-1.5 px-3 rounded-xl border border-slate-200 shadow-sm"
                             x-text="preview.name"></div>
                        <div class="flex-1 relative rounded-xl border border-slate-200 bg-white shadow-lg overflow-hidden">
                            <img x-effect="if(preview.isFile) $el.src = preview.url"
                                 class="absolute inset-0 w-full h-full object-contain p-2">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 操作卡片 -->
            <div class="bg-white/80 backdrop-blur rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200/50 p-5 shrink-0 relative overflow-hidden animate-slide-up" style="animation-delay: 0.3s">

                <!-- 进度条覆盖层 -->
                <div x-show="progress.active"
                     x-transition:enter="transition ease-out duration-200"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     class="absolute inset-0 z-10 flex flex-col justify-center bg-white/95 backdrop-blur-sm rounded-2xl p-5">

                    <!-- 进度条 -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-semibold text-slate-600" x-text="progress.message || '处理中...'"></span>
                            <span class="text-xs font-bold text-primary-600" x-text="`${progress.percent}%`"></span>
                        </div>
                        <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-primary-500 to-primary-600 rounded-full transition-all duration-300 ease-out"
                                 :class="{'animate-pulse': progress.active}"
                                 :style="`width: ${progress.percent}%`"></div>
                        </div>
                    </div>

                    <!-- 当前文件 -->
                    <div x-show="progress.current" class="mb-3 text-center">
                        <span class="text-xs text-slate-500">正在处理: </span>
                        <span class="text-xs font-medium text-slate-700 truncate max-w-[200px]" x-text="progress.current"></span>
                    </div>

                    <!-- 统计信息 -->
                    <div class="flex justify-center gap-4 text-center">
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-slate-800" x-text="progress.total">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">总数</span>
                        </div>
                        <div class="w-px bg-slate-200"></div>
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-emerald-600" x-text="progress.success">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">成功</span>
                        </div>
                        <div class="w-px bg-slate-200"></div>
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-amber-500" x-text="progress.skipped">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">跳过</span>
                        </div>
                        <div class="w-px bg-slate-200"></div>
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-danger-600" x-text="progress.failure">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">失败</span>
                        </div>
                    </div>

                    <!-- 完成状态 -->
                    <div x-show="progress.complete" x-transition
                         class="mt-4 p-3 rounded-xl text-center"
                         :class="{
                             'bg-emerald-50 text-emerald-700': progress.failure === 0,
                             'bg-amber-50 text-amber-700': progress.failure > 0 && progress.success > 0,
                             'bg-danger-50 text-danger-700': progress.success === 0
                         }">
                        <span class="text-sm font-medium" x-text="progress.message"></span>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-4">
                    <div>
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-bold text-slate-800" x-text="selectedItems.length">0</span>
                            <span class="text-sm text-slate-400">/ 待处理</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xs px-3 py-1.5 rounded-xl font-medium transition-all duration-200"
                              :class="isValidConfig ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
                              x-text="isValidConfig ? '配置有效' : '需保存配置'"></span>
                    </div>
                </div>

                <button @click="startProcess()"
                        :disabled="!canStart"
                        class="w-full py-3 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white rounded-xl font-bold shadow-lg shadow-emerald-500/30 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    开始执行
                </button>
                <p class="mt-2 text-center text-xs text-slate-400" x-show="!canStart">请保存配置并选择文件</p>

                <!-- 缓存管理 -->
                <div class="mt-4 pt-3 border-t border-slate-100">
                    <div class="flex items-center justify-between cursor-pointer" @click="showCacheInfo = !showCacheInfo">
                        <span class="text-[11px] text-slate-400 font-medium">💾 数据缓存</span>
                        <svg class="w-3 h-3 text-slate-300 transition-transform" :class="showCacheInfo ? 'rotate-180' : ''" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div x-show="showCacheInfo" class="mt-2 space-y-1.5">
                        <div class="flex justify-between text-[11px]">
                            <span class="text-slate-400">磁盘占用</span>
                            <span class="font-medium"
                                  :class="cacheStats.size_mb > cacheStats.max_size_mb * 0.8 ? 'text-amber-600' : 'text-slate-600'"
                                  x-text="`${cacheStats.size_mb} / ${cacheStats.max_size_mb} MB`"></span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-300"
                                 :class="cacheStats.size_mb > cacheStats.max_size_mb * 0.8 ? 'bg-amber-400' : 'bg-primary-400'"
                                 :style="`width: ${Math.min(100, (cacheStats.size_mb / cacheStats.max_size_mb) * 100)}%`"></div>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-slate-400">EXIF 记录</span>
                            <span class="text-slate-600" x-text="cacheStats.total_entries"></span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-slate-400">已保存地点标签</span>
                            <span class="text-slate-600" x-text="cacheStats.custom_texts"></span>
                        </div>
                        <button @click="clearAllCache()"
                                class="w-full mt-1 py-1.5 rounded-lg border border-danger-200 text-[11px] text-danger-500 hover:bg-danger-50 transition-all">
                            清空 EXIF/星级缓存
                        </button>
                        <button @click="clearCustomTextCache()"
                                class="w-full mt-1 py-1.5 rounded-lg border border-slate-200 text-[11px] text-slate-500 hover:bg-slate-50 transition-all">
                            清空地点标签
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div x-show="marquee.active"
     x-cloak
     class="fixed z-50 pointer-events-none border border-primary-500 bg-primary-500/15 rounded"
     :style="marqueeStyle"></div>

<div x-show="contextMenu.show"
     x-cloak
     @click.outside="closeContextMenu()"
     class="fixed z-50 w-48 rounded-xl border border-slate-200 bg-white shadow-xl shadow-slate-900/10 py-1 text-xs text-slate-700"
     :style="contextMenuStyle">
    <div class="px-3 py-2 border-b border-slate-100">
        <div class="font-semibold text-slate-800 truncate" x-text="contextMenu.file?.label || contextMenu.file?.name || '文件'"></div>
        <div class="mt-0.5 text-[11px]"
             :class="contextMenu.file?.rating ? 'text-amber-500' : 'text-slate-400'"
             x-text="formatRatingLabel(contextMenu.file?.rating)"></div>
    </div>
    <button type="button" class="w-full px-3 py-2 text-left hover:bg-slate-50"
            @click="contextPreview()">预览</button>
    <button type="button" class="w-full px-3 py-2 text-left hover:bg-slate-50"
            @click="contextSelectOnly()">仅选中此项</button>
    <button type="button" class="w-full px-3 py-2 text-left hover:bg-slate-50"
            @click="contextToggleSelection()"
            x-text="contextMenu.file && selectedItems.includes(contextMenu.file.value || contextMenu.file.key) ? '取消选中' : '选中'"></button>
    <button type="button" class="w-full px-3 py-2 text-left hover:bg-slate-50"
            @click="contextSelectSameRating()">选中同星级</button>
